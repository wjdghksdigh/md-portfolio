<svg width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <!-- 아래 빨간 배경 -->
  <rect width="1920" height="1080" fill="#D50032"/>
  <!-- 사선 위 흰색 영역 -->
  <polygon points="0,0 1920,0 1920,620 0,980" fill="#ffffff"/>

  <!-- 흰색 영역 도형 (검정, 과하지 않게) -->
  <circle cx="1600" cy="180" r="180" fill="none" stroke="#000000" stroke-width="1" opacity="0.07"/>
  <circle cx="1600" cy="180" r="110" fill="none" stroke="#000000" stroke-width="0.8" opacity="0.05"/>

  <rect x="80" y="60" width="120" height="120" rx="4" fill="none" stroke="#000000" stroke-width="0.8" opacity="0.06"/>
  <rect x="100" y="80" width="80" height="80" rx="4" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.04"/>

  <line x1="300" y1="0" x2="0" y2="300" stroke="#000000" stroke-width="0.8" opacity="0.04"/>
  <line x1="600" y1="0" x2="0" y2="600" stroke="#000000" stroke-width="0.6" opacity="0.03"/>

  <!-- 사선 -->
  <line x1="0" y1="980" x2="1920" y2="620" stroke="#D50032" stroke-width="2" opacity="0.5"/>

  <!-- 빨간 영역 도형 (검정, 과하지 않게) -->
  <circle cx="1920" cy="1080" r="520" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.12"/>
  <circle cx="1920" cy="1080" r="380" fill="none" stroke="#000000" stroke-width="1" opacity="0.09"/>
  <circle cx="1920" cy="1080" r="240" fill="none" stroke="#000000" stroke-width="0.8" opacity="0.07"/>

  <rect x="60" y="820" width="80" height="80" rx="4" fill="none" stroke="#000000" stroke-width="0.8" opacity="0.1"/>
  <rect x="80" y="840" width="40" height="40" rx="2" fill="none" stroke="#000000" stroke-width="0.6" opacity="0.07"/>
</svg>
